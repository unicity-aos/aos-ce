[package]
name = "astrid-capsule-openai-compat"
version = "0.1.0"
description = "OpenAI-compatible LLM Provider"
authors = ["Astrid Core Team"]
astrid-version = ">=0.1.0"

[[component]]
id = "openai-compat"
file = "astrid_capsule_openai_compat.wasm"
type = "executable"
capabilities = { net = ["*"] }

[capabilities]
net = ["*"]
ipc_publish = ["llm.v1.stream.openai-compat"]

[env]
api_key = { type = "secret", request = "Enter your API key for the OpenAI-compatible provider", placeholder = "sk-..." }
base_url = { type = "string", request = "Enter the API base URL", default = "https://api.openai.com", placeholder = "https://api.openai.com" }
model = { type = "string", request = "Enter the default model ID", default = "gpt-5.4", placeholder = "gpt-5.4" }

[[llm_provider]]
id = "openai-compat"
description = "OpenAI-compatible provider (configurable via base_url)"
capabilities = ["text", "vision", "tools"]

[[interceptor]]
event = "llm.v1.request.generate.openai-compat"
action = "handle_llm_request"
