name: Promote AOS channel

on:
  workflow_dispatch:
    inputs:
      channel:
        description: Signed update channel to advance
        required: true
        type: choice
        options: [stable, dev, nightly]
      release_tag:
        description: Existing immutable AOS calendar-semver release tag
        required: true
        type: string
      generation:
        description: New monotonically increasing channel generation
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: aos-channel-${{ inputs.channel }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Verify immutable release and sign pointer
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.12'
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Validate promotion inputs
        env:
          CHANNEL: ${{ inputs.channel }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          GENERATION: ${{ inputs.generation }}
        run: |
          [[ "$CHANNEL" =~ ^(stable|dev|nightly)$ ]]
          [[ "$RELEASE_TAG" =~ ^(202[6-9]|20[3-9][0-9])\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]
          [[ "$GENERATION" =~ ^[1-9][0-9]{0,17}$ ]]
      - name: Download and authenticate immutable release metadata
        env:
          GH_TOKEN: ${{ github.token }}
          CHANNEL: ${{ inputs.channel }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          RELEASE_METADATA="unicity-aos-${RELEASE_TAG}-release.toml"
          gh release download "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "$RELEASE_METADATA" \
            --pattern "$RELEASE_METADATA.sigstore.json"
          IDENTITY="https://github.com/unicity-aos/aos-ce/.github/workflows/release.yml@refs/tags/${RELEASE_TAG}"
          cosign verify-blob \
            --bundle "$RELEASE_METADATA.sigstore.json" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-identity "$IDENTITY" \
            --use-signed-timestamps \
            "$RELEASE_METADATA"
          python3 scripts/release_metadata.py validate-release \
            --require-ready "$RELEASE_METADATA"
          SOURCE_COMMIT=$(python3 - "$RELEASE_METADATA" <<'PY'
          import sys
          import tomllib

          with open(sys.argv[1], "rb") as file:
              print(tomllib.load(file)["source-commit"])
          PY
          )
          TAG_COMMIT=$(gh api "repos/$GITHUB_REPOSITORY/commits/$RELEASE_TAG" --jq .sha)
          [[ "$SOURCE_COMMIT" == "$TAG_COMMIT" ]]
          if [[ "$CHANNEL" == stable ]]; then
            gh release view "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --json isDraft,isPrerelease \
              --jq 'select(.isDraft == false and .isPrerelease == false) | true' \
              | grep -Fx true
          fi
          echo "RELEASE_METADATA=$RELEASE_METADATA" >> "$GITHUB_ENV"
      - name: Authenticate current channel generation
        env:
          GH_TOKEN: ${{ github.token }}
          CHANNEL: ${{ inputs.channel }}
          GENERATION: ${{ inputs.generation }}
        run: |
          CHANNEL_TAG="channel-${CHANNEL}"
          if gh release view "$CHANNEL_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            mkdir current-channel
            gh release download "$CHANNEL_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --dir current-channel \
              --pattern channel.toml \
              --pattern channel.toml.sigstore.json
            IDENTITY="https://github.com/unicity-aos/aos-ce/.github/workflows/promote-channel.yml@refs/heads/main"
            cosign verify-blob \
              --bundle current-channel/channel.toml.sigstore.json \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com \
              --certificate-identity "$IDENTITY" \
              --use-signed-timestamps \
              current-channel/channel.toml
            python3 scripts/release_metadata.py validate-channel \
              --channel "$CHANNEL" current-channel/channel.toml
            CURRENT=$(python3 - current-channel/channel.toml <<'PY'
          import sys
          import tomllib

          with open(sys.argv[1], "rb") as file:
              print(tomllib.load(file)["generation"])
          PY
            )
            [[ "$GENERATION" -gt "$CURRENT" ]]
          else
            [[ "$GENERATION" == 1 ]]
          fi
      - name: Render and sign channel pointer
        env:
          CHANNEL: ${{ inputs.channel }}
          GENERATION: ${{ inputs.generation }}
          COSIGN_YES: 'true'
        run: |
          read -r PUBLISHED_AT EXPIRES_AT < <(python3 - "$CHANNEL" <<'PY'
          import datetime
          import sys

          days = {"stable": 30, "dev": 7, "nightly": 2}[sys.argv[1]]
          published = datetime.datetime.now(datetime.timezone.utc).replace(microsecond=0)
          expires = published + datetime.timedelta(days=days)
          print(
              published.strftime("%Y-%m-%dT%H:%M:%SZ"),
              expires.strftime("%Y-%m-%dT%H:%M:%SZ"),
          )
          PY
          )
          python3 scripts/release_metadata.py render-channel \
            --channel "$CHANNEL" \
            --generation "$GENERATION" \
            --published-at "$PUBLISHED_AT" \
            --expires-at "$EXPIRES_AT" \
            --release-metadata "$RELEASE_METADATA" \
            --require-ready \
            --output channel.toml
          cosign sign-blob --yes --bundle channel.toml.sigstore.json channel.toml
          IDENTITY="https://github.com/unicity-aos/aos-ce/.github/workflows/promote-channel.yml@refs/heads/main"
          cosign verify-blob \
            --bundle channel.toml.sigstore.json \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-identity "$IDENTITY" \
            --use-signed-timestamps \
            channel.toml
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: aos-channel-${{ inputs.channel }}-${{ inputs.generation }}
          path: |
            channel.toml
            channel.toml.sigstore.json
            ${{ env.RELEASE_METADATA }}

  publish:
    name: Publish signed channel pointer
    needs: prepare
    runs-on: ubuntu-latest
    environment:
      name: aos-channel-${{ inputs.channel }}
    permissions:
      contents: write
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.12'
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: aos-channel-${{ inputs.channel }}-${{ inputs.generation }}
      - name: Revalidate approved pointer
        env:
          CHANNEL: ${{ inputs.channel }}
          GENERATION: ${{ inputs.generation }}
        run: |
          IDENTITY="https://github.com/unicity-aos/aos-ce/.github/workflows/promote-channel.yml@refs/heads/main"
          cosign verify-blob \
            --bundle channel.toml.sigstore.json \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-identity "$IDENTITY" \
            --use-signed-timestamps \
            channel.toml
          python3 scripts/release_metadata.py validate-channel \
            --channel "$CHANNEL" \
            --minimum-generation "$GENERATION" \
            channel.toml
          [[ "$(python3 -c 'import tomllib; print(tomllib.load(open("channel.toml", "rb"))["generation"])')" == "$GENERATION" ]]
      - name: Publish immutable history then current pointer
        env:
          GH_TOKEN: ${{ github.token }}
          CHANNEL: ${{ inputs.channel }}
          GENERATION: ${{ inputs.generation }}
        run: |
          CHANNEL_TAG="channel-${CHANNEL}"
          IDENTITY="https://github.com/unicity-aos/aos-ce/.github/workflows/promote-channel.yml@refs/heads/main"
          verify_pointer() {
            cosign verify-blob \
              --bundle "$2" \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com \
              --certificate-identity "$IDENTITY" \
              --use-signed-timestamps \
              "$1" >/dev/null || return 1
            python3 scripts/release_metadata.py validate-channel --channel "$CHANNEL" "$1"
          }
          generation_of() {
            python3 - "$1" <<'PY'
          import sys
          import tomllib

          with open(sys.argv[1], "rb") as file:
              print(tomllib.load(file)["generation"])
          PY
          }

          release_error="$RUNNER_TEMP/channel-release-error"
          if gh release view "$CHANNEL_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>"$release_error"; then
            channel_exists=1
          elif grep -Eqi 'release not found|HTTP 404' "$release_error"; then
            channel_exists=0
          else
            cat "$release_error" >&2
            exit 1
          fi
          if [[ "$channel_exists" == 0 ]]; then
            [[ "$GENERATION" == 1 ]]
            gh release create "$CHANNEL_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --target main \
              --prerelease \
              --title "AOS ${CHANNEL} channel" \
              --notes "Signed mutable channel pointer; immutable generations are retained as assets."
          fi

          assets=$(gh release view "$CHANNEL_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --json assets \
            --jq '.assets[].name')
          history_generations=$(printf '%s\n' "$assets" | sed -nE "s/^channel-${CHANNEL}-([1-9][0-9]{0,17})\\.toml$/\\1/p")
          history_floor=0
          if [[ -n "$history_generations" ]]; then
            history_floor=$(printf '%s\n' "$history_generations" | sort -n | tail -n1)
            mkdir -p existing-history-floor
            FLOOR_HISTORY="channel-${CHANNEL}-${history_floor}.toml"
            if printf '%s\n' "$assets" | grep -Fx "$FLOOR_HISTORY.sigstore.json" >/dev/null; then
              gh release download "$CHANNEL_TAG" \
                --repo "$GITHUB_REPOSITORY" \
                --dir existing-history-floor \
                --pattern "$FLOOR_HISTORY" \
                --pattern "$FLOOR_HISTORY.sigstore.json"
              verify_pointer \
                "existing-history-floor/$FLOOR_HISTORY" \
                "existing-history-floor/$FLOOR_HISTORY.sigstore.json"
            else
              [[ "$history_floor" == "$GENERATION" ]]
              gh release download "$CHANNEL_TAG" \
                --repo "$GITHUB_REPOSITORY" \
                --dir existing-history-floor \
                --pattern "$FLOOR_HISTORY"
              cmp channel.toml "existing-history-floor/$FLOOR_HISTORY"
            fi
            [[ "$(generation_of "existing-history-floor/$FLOOR_HISTORY")" == "$history_floor" ]]
          fi

          current_generation=0
          current_pointer_present=0
          current_bundle_present=0
          printf '%s\n' "$assets" | grep -Fx channel.toml >/dev/null && current_pointer_present=1
          printf '%s\n' "$assets" | grep -Fx channel.toml.sigstore.json >/dev/null && current_bundle_present=1
          if [[ "$current_pointer_present" == 1 || "$current_bundle_present" == 1 ]]; then
            mkdir -p existing-current
            [[ "$current_pointer_present" == 0 ]] || gh release download "$CHANNEL_TAG" \
              --repo "$GITHUB_REPOSITORY" --dir existing-current --pattern channel.toml
            [[ "$current_bundle_present" == 0 ]] || gh release download "$CHANNEL_TAG" \
              --repo "$GITHUB_REPOSITORY" --dir existing-current --pattern channel.toml.sigstore.json
          fi
          if [[ "$current_pointer_present" == 1 && "$current_bundle_present" == 1 ]] && \
            verify_pointer existing-current/channel.toml existing-current/channel.toml.sigstore.json; then
            current_generation=$(generation_of existing-current/channel.toml)
          elif [[ "$current_pointer_present" == 1 ]]; then
            python3 scripts/release_metadata.py validate-channel \
              --channel "$CHANNEL" existing-current/channel.toml
            current_generation=$(generation_of existing-current/channel.toml)
            CURRENT_HISTORY="channel-${CHANNEL}-${current_generation}.toml"
            mkdir -p current-history
            gh release download "$CHANNEL_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --dir current-history \
              --pattern "$CURRENT_HISTORY" \
              --pattern "$CURRENT_HISTORY.sigstore.json"
            verify_pointer \
              "current-history/$CURRENT_HISTORY" \
              "current-history/$CURRENT_HISTORY.sigstore.json"
            cmp existing-current/channel.toml "current-history/$CURRENT_HISTORY"
            [[ "$current_bundle_present" == 1 ]]
            verify_pointer channel.toml existing-current/channel.toml.sigstore.json
          elif [[ "$current_bundle_present" == 1 ]]; then
            verify_pointer channel.toml existing-current/channel.toml.sigstore.json
          fi

          (( GENERATION >= current_generation )) || {
            echo "refusing stale channel publication over generation $current_generation" >&2
            exit 1
          }
          if (( GENERATION == current_generation )) && [[ "$current_pointer_present" == 1 ]]; then
            cmp channel.toml existing-current/channel.toml || {
              echo "channel generation $GENERATION conflicts with the current pointer" >&2
              exit 1
            }
          fi
          (( GENERATION >= history_floor )) || {
            echo "refusing stale channel publication below immutable history generation $history_floor" >&2
            exit 1
          }

          HISTORY="channel-${CHANNEL}-${GENERATION}.toml"
          history_pointer_present=0
          history_bundle_present=0
          printf '%s\n' "$assets" | grep -Fx "$HISTORY" >/dev/null && history_pointer_present=1
          printf '%s\n' "$assets" | grep -Fx "$HISTORY.sigstore.json" >/dev/null && history_bundle_present=1
          mkdir -p desired-history
          if [[ "$history_pointer_present" == 1 ]]; then
            gh release download "$CHANNEL_TAG" --repo "$GITHUB_REPOSITORY" \
              --dir desired-history --pattern "$HISTORY"
            cmp channel.toml "desired-history/$HISTORY" || {
              echo "channel history generation conflicts with the approved pointer: $HISTORY" >&2
              exit 1
            }
          fi
          if [[ "$history_bundle_present" == 1 ]]; then
            gh release download "$CHANNEL_TAG" --repo "$GITHUB_REPOSITORY" \
              --dir desired-history --pattern "$HISTORY.sigstore.json"
            verify_pointer channel.toml "desired-history/$HISTORY.sigstore.json"
          fi
          cp channel.toml "$HISTORY"
          cp channel.toml.sigstore.json "$HISTORY.sigstore.json"
          [[ "$history_pointer_present" == 1 ]] || gh release upload "$CHANNEL_TAG" \
            --repo "$GITHUB_REPOSITORY" "$HISTORY"
          [[ "$history_bundle_present" == 1 ]] || gh release upload "$CHANNEL_TAG" \
            --repo "$GITHUB_REPOSITORY" "$HISTORY.sigstore.json"
          # Upload the bundle first: a reader racing the two replacements fails
          # closed until the matching signed pointer is in place.
          gh release upload "$CHANNEL_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber channel.toml.sigstore.json
          gh release upload "$CHANNEL_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber channel.toml
